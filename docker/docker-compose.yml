version: "3.9"

services:

  # -------------------- MONGODB --------------------
  mongodb:
    image: mongo:7
    container_name: docuscan-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=admin
      - MONGO_INITDB_ROOT_PASSWORD=admin
    volumes:
      - mongodb_data:/data/db
    networks:
      - docuscan-network
    healthcheck:
      test: ["CMD", "mongosh", "-u", "admin", "-p", "admin", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # -------------------- BACKEND --------------------
  backend:
    build:
      context: ../backend
    container_name: docuscan-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - MONGODBURL=mongodb://admin:admin@mongodb:27017
      - HDFS_WEBHDFS_URL=http://hdfs-namenode:9870/webhdfs/v1
      - AIRFLOW_BASE_URL=http://airflow-webserver:8080
    volumes:
      - ../backend:/app
      - ../ia:/app/ia
      - ../data:/app/data
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - docuscan-network

  # -------------------- FRONTEND --------------------
  frontend:
    build:
      context: ../frontend
    container_name: docuscan-frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8000
    volumes:
      - ../frontend/src:/app/src
      - ../frontend/public:/app/public
      - ../frontend/index.html:/app/index.html
    depends_on:
      - backend
    networks:
      - docuscan-network

  # -------------------- HDFS --------------------
  hdfs-namenode:
    image: bde2020/hadoop-namenode:2.0.0-hadoop3.2.1-java8
    container_name: docuscan-hdfs-namenode
    restart: unless-stopped
    ports:
      - "9870:9870"
      - "9000:9000"
    environment:
      - CLUSTER_NAME=docuscan
      - CORE_CONF_fs_defaultFS=hdfs://hdfs-namenode:9000
      - HDFS_CONF_dfs_webhdfs_enabled=true
      - HDFS_CONF_dfs_permissions_enabled=false
    volumes:
      - hdfs_namenode_data:/hadoop/dfs/name
    networks:
      - docuscan-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9870/ || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5

  hdfs-datanode:
    image: bde2020/hadoop-datanode:2.0.0-hadoop3.2.1-java8
    container_name: docuscan-hdfs-datanode
    restart: unless-stopped
    environment:
      - CORE_CONF_fs_defaultFS=hdfs://hdfs-namenode:9000
    volumes:
      - hdfs_datanode_data:/hadoop/dfs/data
    depends_on:
      hdfs-namenode:
        condition: service_healthy
    networks:
      - docuscan-network

  # -------------------- POSTGRES (AIRFLOW) --------------------
  airflow-postgres:
    image: postgres:15-alpine
    container_name: docuscan-airflow-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=airflow
      - POSTGRES_PASSWORD=airflow
      - POSTGRES_DB=airflow
    volumes:
      - airflow_pg_data:/var/lib/postgresql/data
    networks:
      - docuscan-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  # -------------------- AIRFLOW INIT --------------------
  airflow-init:
    build:
      context: ..
      dockerfile: airflow/Dockerfile
    container_name: docuscan-airflow-init
    restart: "no"
    environment: &airflow-env
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@airflow-postgres/airflow
      - AIRFLOW__CORE__LOAD_EXAMPLES=false
      - AIRFLOW__API__AUTH_BACKENDS=airflow.api.auth.backend.basic_auth
      # --- Performance tuning ---
      - AIRFLOW__CORE__PARALLELISM=4
      - AIRFLOW__CORE__MAX_ACTIVE_TASKS_PER_DAG=2
      - AIRFLOW__CORE__MAX_ACTIVE_RUNS_PER_DAG=3
      - AIRFLOW__SCHEDULER__MAX_DAGRUNS_TO_CREATE_PER_LOOP=3
      - AIRFLOW__SCHEDULER__PARSING_PROCESSES=1
      - AIRFLOW__SCHEDULER__MIN_FILE_PROCESS_INTERVAL=30
      # --- Connections ---
      - MONGO_URL=mongodb://admin:admin@mongodb:27017
      - HDFS_WEBHDFS_URL=http://hdfs-namenode:9870/webhdfs/v1
      - PYTHONPATH=/opt/airflow:/opt/airflow/ia
    entrypoint: >
      bash -c "
        airflow db migrate &&
        airflow users create --username admin --password admin --firstname Admin --lastname User --role Admin --email admin@docuscan.local || true &&
        airflow pools set ml_pool 2 'Pool pour taches ML lourdes (NER, classification)' || true
      "
    depends_on:
      airflow-postgres:
        condition: service_healthy
    networks:
      - docuscan-network

  # -------------------- AIRFLOW WEBSERVER --------------------
  airflow-webserver:
    build:
      context: ..
      dockerfile: airflow/Dockerfile
    container_name: docuscan-airflow-webserver
    restart: unless-stopped
    environment: *airflow-env
    ports:
      - "8085:8080"
    volumes:
      - ../airflow/dags:/opt/airflow/dags
      - ../airflow/plugins:/opt/airflow/plugins
      - ../ia:/opt/airflow/ia
    command: airflow webserver
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    networks:
      - docuscan-network

  # -------------------- AIRFLOW SCHEDULER --------------------
  airflow-scheduler:
    build:
      context: ..
      dockerfile: airflow/Dockerfile
    container_name: docuscan-airflow-scheduler
    restart: unless-stopped
    environment: *airflow-env
    volumes:
      - ../airflow/dags:/opt/airflow/dags
      - ../airflow/plugins:/opt/airflow/plugins
      - ../ia:/opt/airflow/ia
      - ../data:/opt/airflow/data
      - hf_cache:/home/airflow/.cache/huggingface
    command: airflow scheduler
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 1G
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    networks:
      - docuscan-network

# -------------------- VOLUMES --------------------
volumes:
  mongodb_data:
  airflow_pg_data:
  hdfs_namenode_data:
  hdfs_datanode_data:
  hf_cache:

# -------------------- NETWORK --------------------
networks:
  docuscan-network:
    driver: bridge